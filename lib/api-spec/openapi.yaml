openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Exam Preparation System (EPS) API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: courses
  - name: topics
  - name: questions
  - name: exams
  - name: users
  - name: admin
  - name: programs
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Self-register a new student account (pending admin approval)
      description: >
        Always returns a generic acknowledgment regardless of whether the email
        already exists, to avoid account enumeration. New accounts are created
        with status "pending" and require admin approval before they can sign in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "202":
          description: Registration request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Bad request

  /auth/me/password:
    patch:
      operationId: changeMyPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Updated
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/email:
    patch:
      operationId: changeMyEmail
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeEmailRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Email already in use

  /notifications:
    get:
      operationId: listMyNotifications
      tags: [notifications]
      summary: List notifications for the authenticated user (newest first)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Notification" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark one notification as read (only if it belongs to the caller)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notification" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all of the caller's notifications as read
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkAllReadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /messages:
    get:
      operationId: listMyMessages
      tags: [messages]
      summary: List messages for the authenticated user (newest first)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /messages/{id}/read:
    patch:
      operationId: markMessageRead
      tags: [messages]
      summary: Mark one message as read (only if it belongs to the caller)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found

  /messages/read-all:
    patch:
      operationId: markAllMessagesRead
      tags: [messages]
      summary: Mark all of the caller's messages as read
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkAllReadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/profile-image:
    patch:
      operationId: updateMyProfileImage
      tags: [auth]
      summary: Update or clear current user's profile image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileImageRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/delete:
    post:
      operationId: deleteMyAccount
      tags: [auth]
      summary: Self-service account deletion (students only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
      responses:
        "204":
          description: Account deleted
        "400":
          description: Bad request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current authenticated user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /programs:
    get:
      operationId: listPrograms
      tags: [programs]
      summary: List active programs (any authenticated user)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Program" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createProgram
      tags: [programs]
      summary: Create a new program (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Program" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Program code already in use

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all courses (lecturer/admin) or current user's enrolled courses (student)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course (lecturer/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateCourse
      tags: [courses]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{id}/topics:
    get:
      operationId: listCourseTopics
      tags: [topics]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"
    post:
      operationId: createTopic
      tags: [topics]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTopicRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
        "403":
          $ref: "#/components/responses/Forbidden"

  /topics/{id}:
    put:
      operationId: updateTopic
      tags: [topics]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTopicRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTopic
      tags: [topics]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/courses:
    get:
      operationId: getUserCourses
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

  /questions:
    get:
      operationId: listQuestions
      tags: [questions]
      parameters:
        - in: query
          name: courseId
          schema:
            type: integer
        - in: query
          name: topicId
          schema:
            type: integer
        - in: query
          name: difficulty
          schema:
            $ref: "#/components/schemas/Difficulty"
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/QuestionStatus"
        - in: query
          name: q
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createQuestion
      tags: [questions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "403":
          $ref: "#/components/responses/Forbidden"

  /questions/search:
    get:
      operationId: searchQuestions
      tags: [questions]
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: courseId
          schema:
            type: integer
        - in: query
          name: topicId
          schema:
            type: integer
        - in: query
          name: difficulty
          schema:
            $ref: "#/components/schemas/Difficulty"
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/QuestionStatus"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  /questions/{id}:
    get:
      operationId: getQuestion
      tags: [questions]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateQuestion
      tags: [questions]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "403":
          $ref: "#/components/responses/Forbidden"

  /questions/{id}/archive:
    patch:
      operationId: archiveQuestion
      tags: [questions]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "403":
          $ref: "#/components/responses/Forbidden"

  /exams/generate:
    post:
      operationId: generateExam
      tags: [exams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateExamRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithQuestions"
        "400":
          $ref: "#/components/responses/BadRequest"

  /exams/{id}:
    get:
      operationId: getExam
      tags: [exams]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithQuestions"
        "404":
          $ref: "#/components/responses/NotFound"

  /exams/{id}/start:
    post:
      operationId: startExam
      tags: [exams]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithQuestions"

  /exams/{id}/submit:
    post:
      operationId: submitExam
      tags: [exams]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitExamRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /exams/{id}/review:
    get:
      operationId: getExamReview
      tags: [exams]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamReview"

  /users/{id}/exams:
    get:
      operationId: getUserExams
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exam"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      parameters:
        - in: query
          name: role
          schema:
            $ref: "#/components/schemas/Role"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createUser
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad Request
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Email already in use

  /admin/users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteUser
      tags: [admin]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Deleted
        "400":
          description: Bad request
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{id}/members:
    get:
      operationId: listCourseMembers
      tags: [courses]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: addCourseMember
      tags: [courses]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCourseMemberRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Already a member

  /courses/{id}/members/{userId}:
    delete:
      operationId: removeCourseMember
      tags: [courses]
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/deletion-requests:
    get:
      operationId: listDeletionRequests
      tags: [admin]
      summary: All account deletion requests (newest first)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeletionRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/overview:
    get:
      operationId: getAdminOverview
      tags: [admin]
      summary: System overview totals (users, courses, topics, questions, exams)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    Role:
      type: string
      enum: [student, lecturer, admin]

    Difficulty:
      type: string
      enum: [Easy, Medium, Hard]

    QuestionStatus:
      type: string
      enum: [draft, approved, archived]

    QuestionType:
      type: string
      enum: [single_choice, multiple_choice]

    ExamStatus:
      type: string
      enum: [generated, in_progress, submitted]

    User:
      type: object
      properties:
        id: { type: integer }
        fullName: { type: string }
        email: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        accountStatus: { type: string }
        profileImageUrl: { type: string, nullable: true }
        programId: { type: integer, nullable: true, description: "Student's program (null for admins/lecturers)" }
        programName: { type: string, nullable: true }
        programCode: { type: string, nullable: true }
        programIds:
          type: array
          description: "Programs a lecturer teaches in (only populated for lecturers)"
          items: { type: integer }
        currentStudyYear:
          type: string
          nullable: true
          enum: [First, Second, Third, Fourth, null]
          description: "Student's current year of study"
        currentSemester:
          type: string
          nullable: true
          enum: [A, B, null]
          description: "Student's current semester"
        mustChangePassword:
          type: boolean
          description: "True when the user has a system-assigned temporary password and must change it before using the app"
      required: [id, fullName, email, role, accountStatus]

    Program:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        status: { type: string }
      required: [id, name, code, status]

    CreateProgramRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        code: { type: string, minLength: 1 }
        status: { type: string }
      required: [name, code]

    CreateUserRequest:
      type: object
      properties:
        fullName: { type: string }
        email: { type: string }
        password: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        accountStatus: { type: string }
        programId:
          type: integer
          nullable: true
          description: "For role=student: the program they study in"
        programIds:
          type: array
          description: "For role=lecturer: programs they teach in"
          items: { type: integer }
        currentStudyYear:
          type: string
          nullable: true
          enum: [First, Second, Third, Fourth, null]
          description: "For role=student: current year of study"
        currentSemester:
          type: string
          nullable: true
          enum: [A, B, null]
          description: "For role=student: current semester"
      required: [fullName, email, password, role]

    UpdateUserRequest:
      type: object
      properties:
        fullName: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        accountStatus: { type: string }

    AddCourseMemberRequest:
      type: object
      properties:
        userId: { type: integer }
      required: [userId]

    Notification:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        title: { type: string }
        message: { type: string }
        relatedEntityType: { type: string, nullable: true }
        relatedEntityId: { type: integer, nullable: true }
        status: { type: string, enum: [unread, read] }
        createdAt: { type: string, format: date-time }
        readAt: { type: string, format: date-time, nullable: true }
      required: [id, type, title, message, status, createdAt]

    Message:
      type: object
      properties:
        id: { type: integer }
        senderId: { type: integer, nullable: true }
        senderName: { type: string, nullable: true }
        subject: { type: string }
        body: { type: string }
        status: { type: string, enum: [unread, read] }
        createdAt: { type: string, format: date-time }
        readAt: { type: string, format: date-time, nullable: true }
      required: [id, subject, body, status, createdAt]

    MarkAllReadResponse:
      type: object
      properties:
        updated: { type: integer }
      required: [updated]

    UpdateProfileImageRequest:
      type: object
      properties:
        imageDataUrl:
