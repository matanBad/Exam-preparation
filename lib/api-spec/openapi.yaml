    ChangeEmailRequest:
      type: object
      properties:
        currentPassword: { type: string }
        newEmail: { type: string, format: email }
      required: [currentPassword, newEmail]

    LoginRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    RegisterRequest:
      type: object
      properties:
        fullName: { type: string, minLength: 1 }
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        programId:
          type: integer
          description: "Program/track the student is enrolling in"
        currentStudyYear:
          type: string
          enum: [First, Second, Third, Fourth]
          description: "Student's current year of study"
        currentSemester:
          type: string
          enum: [A, B]
          description: "Student's current semester"
      required: [fullName, email, password, programId, currentStudyYear, currentSemester]

    RegisterResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]

    AuthLoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
      required: [token, user]

    Course:
      type: object
      properties:
        id: { type: integer }
        courseCode: { type: string }
        courseName: { type: string }
        semester: { type: string, nullable: true }
        academicYear: { type: string, nullable: true }
        status: { type: string }
        offeringId: { type: integer, nullable: true, description: "Set when row represents a specific course offering" }
        programId: { type: integer, nullable: true }
        programName: { type: string, nullable: true }
        programCode: { type: string, nullable: true }
        lecturerId: { type: integer, nullable: true }
        lecturerName: { type: string, nullable: true }
        studyYear:
          type: string
          nullable: true
          enum: [First, Second, Third, Fourth, null]
          description: "Study year of the matched offering"
        offeringSemester:
          type: string
          nullable: true
          enum: [A, B, null]
          description: "Semester of the matched offering (A/B)"
      required: [id, courseCode, courseName, status]

    CreateCourseRequest:
      type: object
      properties:
        courseCode: { type: string }
        courseName: { type: string }
        semester: { type: string, nullable: true }
        academicYear: { type: string, nullable: true }
        programId:
          type: integer
          description: "Program/track this offering belongs to"
        lecturerId:
          type: integer
          nullable: true
          description: "Lecturer teaching this offering. Defaults to the caller when they are a lecturer."
      required: [courseCode, courseName, programId]

    UpdateCourseRequest:
      type: object
      properties:
        courseCode: { type: string }
        courseName: { type: string }
        semester: { type: string, nullable: true }
        academicYear: { type: string, nullable: true }
        status: { type: string }

    Topic:
      type: object
      properties:
        id: { type: integer }
        courseId: { type: integer }
