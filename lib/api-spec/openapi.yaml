      type: object
      properties:
        examQuestionId: { type: integer }
        selectedAnswerOptionId: { type: integer, nullable: true }
      required: [examQuestionId]

    SubmitExamRequest:
      type: object
      properties:
        answers:
          type: array
          items: { $ref: "#/components/schemas/SubmitAnswer" }
      required: [answers]

    ExamResult:
      type: object
      properties:
        examId: { type: integer }
        score: { type: number }
